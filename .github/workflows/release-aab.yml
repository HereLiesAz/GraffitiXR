name: Build & Publish AAB (Play)

# Manually-triggered workflow that builds a SIGNED Android App Bundle and,
# optionally, publishes it to Google Play via the Play Developer API.
#
# Safe by default: it builds + uploads the .aab as a workflow artifact only.
# Publishing to Play happens ONLY when `publish` is set to true, and defaults
# to the internal track with draft status.
on:
  push:
    # Don't re-trigger on the version-bump commit this workflow pushes back (it also carries
    # [skip ci], but ignoring the path is a clean belt-and-suspenders).
    paths-ignore:
      - version.properties
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: "Release status on the chosen track"
        type: choice
        default: completed
        options:
          - draft
          - completed
      publish:
        description: "Publish to Play? (off = build + upload .aab artifact only)"
        type: boolean
        default: true

# Least-privilege default token; jobs needing more declare their own permissions block.
permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # write so a publish run can commit the incremented versionBuild in version.properties back.
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so the commit count (versionCode) is correct.
          fetch-depth: 0

      - name: Setup Dependencies
        run: chmod +x setup_libs.sh && ./setup_libs.sh

      - name: Inject Google Services
        env:
          GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: |
          if [ -f "app/google-services.json.template" ]; then
            echo "Template found. Injecting secrets..."
            sed -e 's/{{\([^}]*\)}}/${\1}/g' app/google-services.json.template | envsubst > app/google-services.json
          else
            echo "Warning: google-services.json.template not found. Skipping injection."
          fi

          # Inject ARCore API Key into local.properties for build.gradle.kts to pick up
          echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> local.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::error::KEYSTORE_RAW secret is empty — cannot produce a signed bundle."
            exit 1
          fi
          echo "$KEYSTORE_RAW" | base64 -d > app/keystore.jks
          if [ ! -s app/keystore.jks ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_RAW is not valid base64."
            exit 1
          fi
          echo "Keystore decoded to app/keystore.jks ($(stat -c%s app/keystore.jks) bytes)"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve package name and bump versionCode (from version.properties)
        id: meta
        run: |
          # Read the applicationId straight from the build config (don't hardcode).
          PKG=$(grep -E 'applicationId\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "package_name=$PKG" >> "$GITHUB_OUTPUT"

          # versionBuild in version.properties IS the Android versionCode (single source of truth).
          # Increment it here and, on a publish run, commit it back (see "Persist bumped versionCode")
          # so every Play upload is strictly higher than the last. This replaces the old
          # `git rev-list --count HEAD + 10000`, which was not unique per upload: a re-run, a second
          # dispatch from the same HEAD, or building a non-tip commit all reproduced an already-used
          # code (Play rejects with "Version code N has already been used").
          CUR=$(grep -E '^versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          VERSION_CODE=$(( CUR + 1 ))
          sed -i -E "s/^versionBuild=.*/versionBuild=${VERSION_CODE}/" version.properties
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

          # versionName patch also comes from version.properties.
          VERSION_PATCH=$(grep -E '^versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          echo "version_patch=$VERSION_PATCH" >> "$GITHUB_OUTPUT"
          echo "Package: $PKG  versionCode: $VERSION_CODE  versionPatch: $VERSION_PATCH"

      - name: Persist bumped versionCode
        # Only on a real publish: commit the incremented version.properties back so the next upload is
        # strictly higher. Done BEFORE the build/upload so a number is never re-used even if a later
        # step fails (a skipped number is harmless; a duplicate is not). [skip ci] stops a re-trigger.
        if: ${{ inputs.publish }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          if git diff --cached --quiet; then
            echo "version.properties unchanged — nothing to persist"
          else
            git commit -m "ci: bump versionBuild to ${{ steps.meta.outputs.version_code }} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Build Release AAB (signed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Consumed by the signingConfigs.release block in app/build.gradle.kts.
          KEYSTORE_FILE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease -PversionBuild=${{ steps.meta.outputs.version_code }} -PversionPatch=${{ steps.meta.outputs.version_patch }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: graffitixr-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish to Google Play
        if: ${{ inputs.publish }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.meta.outputs.package_name }}
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
