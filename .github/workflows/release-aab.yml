name: Build & Publish AAB (Play)

# Manually-triggered workflow that builds a SIGNED Android App Bundle and,
# optionally, publishes it to Google Play via the Play Developer API.
#
# Safe by default: it builds + uploads the .aab as a workflow artifact only.
# Publishing to Play happens ONLY when `publish` is set to true, and defaults
# to the internal track with draft status.
on:
  push:
    # Auto-publish on merges to main only. Feature-branch pushes would otherwise trigger a
    # release build (and, with the gate below open, a Play upload) for every commit — wasteful
    # and unsafe. Manual dispatch (workflow_dispatch) still works from any branch.
    branches: [ main ]
    # Don't re-trigger on the version-bump commit this workflow pushes back (it also carries
    # [skip ci], but ignoring the path is a clean belt-and-suspenders).
    paths-ignore:
      - version.properties
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: "Release status on the chosen track"
        type: choice
        default: completed
        options:
          - draft
          - completed
      publish:
        description: "Publish to Play? (off = build + upload .aab artifact only)"
        type: boolean
        default: true

# Least-privilege default token; jobs needing more declare their own permissions block.
permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # write so a publish run can commit the incremented versionBuild in version.properties back.
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so the commit count (versionCode) is correct.
          fetch-depth: 0

      - name: Setup Dependencies
        run: chmod +x setup_libs.sh && ./setup_libs.sh

      - name: Inject Google Services
        env:
          GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: |
          if [ -f "app/google-services.json.template" ]; then
            echo "Template found. Injecting secrets..."
            sed -e 's/{{\([^}]*\)}}/${\1}/g' app/google-services.json.template | envsubst > app/google-services.json
          else
            echo "Warning: google-services.json.template not found. Skipping injection."
          fi

          # Inject ARCore API Key into local.properties for build.gradle.kts to pick up
          echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> local.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::error::KEYSTORE_RAW secret is empty — cannot produce a signed bundle."
            exit 1
          fi
          echo "$KEYSTORE_RAW" | base64 -d > app/keystore.jks
          if [ ! -s app/keystore.jks ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_RAW is not valid base64."
            exit 1
          fi
          echo "Keystore decoded to app/keystore.jks ($(stat -c%s app/keystore.jks) bytes)"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve package name
        id: meta
        run: |
          # Read the applicationId straight from the build config (don't hardcode).
          PKG=$(grep -E 'applicationId\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "package_name=$PKG" >> "$GITHUB_OUTPUT"

      - name: Build Release AAB (signed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Consumed by the signingConfigs.release block in app/build.gradle.kts.
          KEYSTORE_FILE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # No -PversionBuild override: build.gradle.kts auto-increments versionBuild in
        # version.properties on every build. The persist step below commits that bump back.
        run: |
          ./gradlew bundleRelease

      - name: Persist auto-incremented versionCode
        # Commit the version.properties bump that the build just made, so the next release is strictly
        # higher (Play rejects a duplicate versionCode). Runs whenever we're about to publish —
        # every push to main, and any manual dispatch with publish=true. [skip ci] (and the
        # push-trigger paths-ignore) stop a re-trigger.
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          if git diff --cached --quiet; then
            echo "version.properties unchanged — nothing to persist"
          else
            NEW=$(grep -E '^versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            git commit -m "ci: versionBuild=${NEW} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: graffitixr-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish to Google Play
        # Auto-publish on push to main (internal / completed); manual dispatch respects the
        # publish flag and its own track/status inputs. `inputs.X || 'default'` falls through
        # on push events where inputs.* are null.
        if: ${{ github.event_name == 'push' || inputs.publish }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.meta.outputs.package_name }}
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track || 'internal' }}
          status: ${{ inputs.status || 'completed' }}
