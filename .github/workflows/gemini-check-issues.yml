name: Check Code and Close Completed Issues

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  issues: write

jobs:
  check-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI to Check Issues
        uses: google-github-actions/run-gemini-cli@v1
        with:
          prompt: "Check the source code against the repository issues. If any open issue is completed or resolved by the current code, close the issue."
          tools: "gh"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
